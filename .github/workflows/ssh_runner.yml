name: ZenLovv
on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py python-dotenv pytest

      - name: Khởi động SSH và tạo Tunnel (Pinggy TCP)
        run: |
          sudo systemctl start ssh
          echo "runner:123456" | sudo chpasswd

          sudo ss -tlnp | grep ':22' || (echo "SSH not listening on 22" && exit 1)

          ssh -T -p 443 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -o ExitOnForwardFailure=yes \
            -R0:localhost:22 \
            tcp@a.pinggy.io > /tmp/pinggy.log 2>&1 &

          sleep 15

          echo "===== Pinggy log ====="
          cat /tmp/pinggy.log

          URL=$(grep -Eo 'tcp://[^[:space:]]+' /tmp/pinggy.log | head -1)
          HOST=$(echo "$URL" | sed -E 's#tcp://([^:]+):([0-9]+).*#\1#')
          PORT=$(echo "$URL" | sed -E 's#tcp://([^:]+):([0-9]+).*#\2#')

          if [ -z "$HOST" ] || [ -z "$PORT" ]; then
            echo "Pinggy endpoint not found in log"
            exit 1
          fi

          printf "%s:%s" "$HOST" "$PORT" > /tmp/proxy_info.txt

          echo "=========================================="
          echo "SSH:    $HOST:$PORT"
          echo "User:   runner"
          echo "Pass:   123456"
          echo "=========================================="

      - name: Start DataScan app
        run: |
          cd DataScan
          npm install > /tmp/datascan-install.log 2>&1
          npm start > /tmp/datascan.log 2>&1 &

          for i in $(seq 1 30); do
            if curl -fsSI http://localhost:8080 > /dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "DataScan failed to become ready"
          echo "===== npm install log ====="
          cat /tmp/datascan-install.log
          echo "===== npm start log ====="
          cat /tmp/datascan.log
          exit 1

      - name: Cài và chạy Cloudflared nhanh (8080)
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cf
          chmod +x cf
          ./cf tunnel --url http://localhost:8080 --no-autoupdate > /tmp/cf.log 2>&1 &
          sleep 8

          CF_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
          if [ -z "$CF_URL" ]; then
            echo "Cloudflared URL not found"
            cat /tmp/cf.log
            exit 1
          fi

          printf '%s' "$CF_URL" > /tmp/cloudflared_url.txt

          echo "=========================================="
          echo "Web:  $CF_URL"
          echo "=========================================="

      - name: Chạy Discord bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CLOUDFLARED_URL_FILE: /tmp/cloudflared_url.txt
        run: |
          python discordbot.py > /tmp/discordbot.log 2>&1 &
          sleep 5
          if ! pgrep -f "python discordbot.py" > /dev/null; then
            echo "Discord bot failed to start"
            cat /tmp/discordbot.log
            exit 1
          fi

      - name: Giữ máy sống 6 tiếng
        run: sleep 21600