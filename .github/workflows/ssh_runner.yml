name: SSH into Runner via Pinggy

on:
  workflow_workflow_dispatch: # Kích hoạt thủ công

jobs:
  debug-ssh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Khởi động SSH và Mở cổng Pinggy
        run: |
          # 1. Khởi động dịch vụ SSH mặc định của máy ảo
          sudo systemctl start ssh
          
          # 2. Đặt mật khẩu cho tài khoản 'runner' (mật khẩu là: 123456)
          echo "runner:123456" | sudo chpasswd
          
          # 3. Tạo đường hầm Pinggy (Lệnh này sẽ treo để giữ kết nối)
          ssh -p 443 -R0:localhost:22 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 a.pinggy.io