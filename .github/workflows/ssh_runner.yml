name: SSH into Runner via Ngrok

on:
  workflow_dispatch:

jobs:
  debug-ssh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Khởi động SSH và Đặt mật khẩu
        run: |
          sudo systemctl start ssh
          echo "runner:123456" | sudo chpasswd

      - name: Chạy Ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          # Tải và cài đặt Ngrok
          curl -s -O https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar -xf ngrok-v3-stable-linux-amd64.tgz
          
          # Xác thực token
          ./ngrok config add-authtoken $NGROK_AUTH_TOKEN
          
          # Mở đường hầm TCP ở background
          ./ngrok tcp 22 > /dev/null &
          
          # Đợi 5 giây cho kết nối ổn định rồi in ra link
          sleep 5
          echo "========================================="
          echo "Vào Ngrok Dashboard để lấy lệnh SSH:"
          echo "https://dashboard.ngrok.com/endpoints/tcp"
          echo "========================================="
          
          # Treo hệ thống (Giữ máy ảo sống tối đa 6 tiếng = 21600 giây)
          sleep 21600