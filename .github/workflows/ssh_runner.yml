name: SSH into Runner via Pinggy

on:
  workflow_dispatch:

jobs:
  debug-ssh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Khởi động SSH và Mở cổng Pinggy
        run: |
          sudo systemctl start ssh
          echo "runner:123456" | sudo chpasswd
          # Đã thêm tcp@ vào trước a.pinggy.io
          ssh -p 443 -R0:localhost:22 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 tcp@a.pinggy.io