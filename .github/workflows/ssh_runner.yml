name: ZenLovv-Windows
on:
  push:
  workflow_dispatch:

jobs:
  build-vps:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài đặt và Cấu hình RDP chuyên sâu
        shell: pwsh
        run: |
          # 1. Đặt mật khẩu cho runneradmin
          $Password = ConvertTo-SecureString "Runner@123456" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          
          # 2. Thêm quyền vào nhóm Remote Desktop
          net localgroup "Remote Desktop Users" runneradmin /add
          
          # 3. Kích hoạt RDP trong Registry
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          
          # 4. Mở tường lửa cho RDP
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          Write-Host "Cấu hình RDP hoàn tất!"

      - name: Chạy Ngrok qua Chocolatey
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        shell: pwsh
        run: |
          # Cài đặt ngrok
          choco install ngrok -y
          $env:Path += ";C:\ProgramData\chocolatey\bin"
          
          # Cấu hình token
          ngrok config add-authtoken "$env:NGROK_AUTH_TOKEN"
          
          # Chạy ngrok vùng Châu Á (ap) để kết nối nhanh từ VN
          Start-Process ngrok -ArgumentList "tcp 3389 --region ap" -NoNewWindow
          
          # Chờ lấy địa chỉ
          Write-Host "Đang đợi Ngrok cấp IP..."
          Start-Sleep -s 10
          $Response = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
          $PublicUrl = $Response.tunnels[0].public_url
          $CleanUrl = $PublicUrl.Replace("tcp://", "")
          
          Write-Host "=========================================="
          Write-Host "ĐỊA CHỈ RDP: $CleanUrl"
          Write-Host "TÀI KHOẢN:   runneradmin"
          Write-Host "MẬT KHẨU:    Runner@123456"
          Write-Host "=========================================="

      - name: Giữ máy chạy
        shell: pwsh
        run: |
          while ($true) {
            Write-Host "VPS đang hoạt động... (Dùng tổ hợp Ctrl+C trên máy bạn nếu muốn ngắt kết nối)"
            Start-Sleep -s 60
          }
