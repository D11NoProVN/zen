name: ZenLovv-Window
on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-vps:
    runs-on: windows-latest # Đổi sang Windows
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Thiết lập mật khẩu User
        shell: pwsh
        run: |
          # Đặt mật khẩu cho user hiện tại (runneradmin)
          $Password = ConvertTo-SecureString "Runner@123456" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          Write-Host "Mật khẩu đã được thiết lập là: Runner@123456"

      - name: Kích hoạt Remote Desktop (RDP)
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Cài và chạy Ngrok (RDP qua cổng 3389)
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        shell: pwsh
        run: |
          # Download ngrok v3
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY19/ngrok-v3-stable-windows-amd64.zip" -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath . -Force
          
          # Set authtoken và start ngrok in background
          .\ngrok.exe config add-authtoken "$env:NGROK_AUTH_TOKEN"
          $ngrokProcess = Start-Process .\ngrok.exe -ArgumentList "tcp 3389" -PassThru -NoNewWindow
          
          # Wait for ngrok API to be ready
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $Response = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -ErrorAction Stop
              break
            } catch {
              Write-Host "Waiting for ngrok... ($i)"
              Start-Sleep -s 2
            }
          }
          
          # Lấy địa chỉ IP từ Ngrok API
          $Response = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
          $PublicUrl = $Response.tunnels[0].public_url
          $CleanUrl = $PublicUrl.Replace("tcp://", "")
          
          Write-Host "=========================================="
          Write-Host "RDP ADDRESS: $CleanUrl"
          Write-Host "Username:    runneradmin"
          Write-Host "Password:    Runner@123456"
          Write-Host "=========================================="

      - name: Giữ máy sống (6 tiếng)
        shell: pwsh
        run: |
          # Chạy vòng lặp để workflow không bị kết thúc sớm
          $i = 0
          while ($i -lt 360) {
            Write-Host "Máy đang hoạt động... ($i phút)"
            Start-Sleep -s 60
            $i++
          }
