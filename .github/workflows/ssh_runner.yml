name: ZenLovv-Windows
on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-vps:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Thiết lập mật khẩu User
        shell: pwsh
        run: |
          $Password = ConvertTo-SecureString "Runner@123456" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          Write-Host "Mật khẩu RDP: Runner@123456"

      - name: Kích hoạt Remote Desktop (RDP)
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Cài đặt và Khởi tạo Ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        shell: pwsh
        run: |
          # Tải bản ngrok stable mới nhất cho Windows
          Invoke-WebRequest -Uri "https://equinox.io" -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath . -Force
          
          # Cấu hình Token
          .\ngrok.exe config add-authtoken "$env:NGROK_AUTH_TOKEN"
          
          # Chạy ngrok TCP cổng 3389 (RDP)
          Start-Process .\ngrok.exe -ArgumentList "tcp 3389" -NoNewWindow
          
          # Chờ ngrok API sẵn sàng (tối đa 30s)
          Write-Host "Đang lấy địa chỉ RDP..."
          $i = 0
          while ($i -lt 15) {
            try {
              $Response = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
              $PublicUrl = $Response.tunnels[0].public_url
              if ($PublicUrl) {
                $CleanUrl = $PublicUrl.Replace("tcp://", "")
                Write-Host "=========================================="
                Write-Host "RDP ADDRESS: $CleanUrl"
                Write-Host "Username:    runneradmin"
                Write-Host "Password:    Runner@123456"
                Write-Host "=========================================="
                break
              }
            } catch {
              Start-Sleep -s 2
              $i++
            }
          }

      - name: Giữ máy sống (6 tiếng)
        shell: pwsh
        run: |
          $i = 0
          while ($i -lt 360) {
            Write-Host "Máy đang chạy... Phút thứ: $i"
            Start-Sleep -s 60
            $i++
          }
