name: SSH via Ngrok + Web via Cloudflared

on:
  workflow_dispatch:

jobs:
  debug-ssh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Khởi động SSH và đặt mật khẩu
        run: |
          sudo systemctl start ssh
          echo "runner:123456" | sudo chpasswd

      - name: Cài và chạy Ngrok (cổng 22)
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          curl -s -O https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar -xf ngrok-v3-stable-linux-amd64.tgz
          ./ngrok config add-authtoken $NGROK_AUTH_TOKEN
          ./ngrok tcp 22 > /dev/null 2>&1 &
          sleep 5

          TUNNEL_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          HOST=$(echo $TUNNEL_URL | sed 's/tcp:\/\///' | cut -d ':' -f 1)
          PORT=$(echo $TUNNEL_URL | sed 's/tcp:\/\///' | cut -d ':' -f 2)

          echo "=========================================="
          echo "SSH:  ssh -p $PORT runner@$HOST"
          echo "Pass: 123456"
          echo "=========================================="

      - name: Cài và chạy Cloudflared (cổng 8080)
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared && chmod +x cloudflared

          # Chạy quick tunnel — không cần tài khoản, không cần token
          ./cloudflared tunnel --url http://localhost:8080 > /tmp/cf.log 2>&1 &
          sleep 8

          # Trích link từ log (dạng https://xxxx.trycloudflare.com)
          CF_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' /tmp/cf.log | head -1)

          echo "=========================================="
          echo "Web:  $CF_URL"
          echo "=========================================="

      - name: Giữ máy sống 6 tiếng
        run: sleep 21600