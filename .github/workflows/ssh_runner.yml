name: ZenLovv-Windows
on:
  push:
  workflow_dispatch:

jobs:
  build-vps:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup RDP & User
        shell: pwsh
        run: |
          $Password = ConvertTo-SecureString "Runner@123456" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          net localgroup "Remote Desktop Users" runneradmin /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Install & Start Ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        shell: pwsh
        run: |
          # 1. Cài đặt ngrok
          choco install ngrok -y
          
          # 2. Cấu hình Authtoken (Dùng lệnh trực tiếp của v3)
          & "C:\ProgramData\chocolatey\bin\ngrok.exe" config add-authtoken "$env:NGROK_AUTH_TOKEN"
          
          # 3. Khởi chạy Ngrok TCP
          Write-Host "Đang khởi tạo Ngrok Tunnel..."
          Start-Process "C:\ProgramData\chocolatey\bin\ngrok.exe" -ArgumentList "tcp 3389 --region ap" -NoNewWindow
          
          # 4. Vòng lặp kiểm tra trạng thái thực tế (Tối đa 2 phút)
          $retryCount = 0
          while ($retryCount -lt 20) {
            try {
              $Response = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -ErrorAction Stop
              if ($Response.tunnels.Count -gt 0) {
                $PublicUrl = $Response.tunnels[0].public_url
                $CleanUrl = $PublicUrl.Replace("tcp://", "")
                Write-Host "=========================================="
                Write-Host "KẾT NỐI THÀNH CÔNG!"
                Write-Host "ĐỊA CHỈ RDP: $CleanUrl"
                Write-Host "TÀI KHOẢN:   runneradmin"
                Write-Host "MẬT KHẨU:    Runner@123456"
                Write-Host "=========================================="
                return # Thoát script thành công
              }
            } catch {
              # Đợi thêm nếu API chưa sẵn sàng
            }
            Write-Host "Đang đợi tunnel phản hồi... ($($retryCount * 5)s)"
            Start-Sleep -s 5
            $retryCount++
          }
          
          Write-Error "LỖI: Ngrok không thể khởi tạo tunnel. Hãy kiểm tra lại Authtoken hoặc thẻ tín dụng."
          exit 1

      - name: Keep Alive
        shell: pwsh
        run: |
          while ($true) {
            Write-Host "Máy đang online - $(Get-Date)"
            Start-Sleep -s 60
          }
